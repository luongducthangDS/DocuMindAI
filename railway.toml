[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT automatically — no need to set it here.
# Increase timeout: model loading (MiniLM ~120MB + cross-encoder ~85MB) + ChromaDB init takes ~90-150s.
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Default environment variables ──────────────────────────────────────────────
# IMPORTANT: GROQ_API_KEY and GOOGLE_API_KEY must be set via Railway dashboard
# or via deploy_railway.ps1 — they are NOT stored here for security reasons.
[deploy.environmentVariables]
ENVIRONMENT = "production"
EMBEDDING_MODEL = "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
CHROMA_COLLECTION = "documind_legal"
# CHROMA_HOST is not set → app falls back to local PersistentClient (bundled in image)
# REDIS_URL is not set → sessions use in-process dict (no persistence across restarts)
# Add a Redis service in Railway dashboard and paste its URL here if persistence is needed.
