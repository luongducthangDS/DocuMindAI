name: CI/CD — DocuMind AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Type Check ───────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format src/ tests/ --check

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      GROQ_API_KEY: "gsk_test_key_ci"
      GOOGLE_API_KEY: "AIza_test_key_ci"
      ENVIRONMENT: "development"
      API_SECRET_KEY: "ci-test-secret-key-32-chars-long!!"
      CHROMA_HOST: "localhost"
      REDIS_URL: "redis://localhost:6379/0"
      LANGCHAIN_TRACING_V2: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install only test-relevant packages (skip heavy ML deps)
          pip install pytest pytest-asyncio pytest-cov pydantic pydantic-settings \
            loguru tenacity httpx aiofiles python-dotenv

      - name: Run tests (fast subset — no real models needed)
        run: |
          pytest tests/test_ingestion.py tests/test_agent.py \
            -v --tb=short \
            --ignore=tests/test_rag.py \
            -k "not hf_dataset"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  # ── Build Docker Image ──────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime

  # ── Deploy to Railway ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

      - name: Smoke test production
        run: |
          sleep 30
          curl -f "${{ secrets.RAILWAY_HEALTH_URL }}/api/v1/health" \
            --retry 5 --retry-delay 10 --retry-connrefused \
            -o /dev/null -s -w "%{http_code}"
